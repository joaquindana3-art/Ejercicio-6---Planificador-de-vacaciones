<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de vacaciones</title>
</head>
<body>
    <h1>Bienvenido al planificador de vacaciones</h1>
    <p>Ingrese los siguientes datos:</p>
    
    <p>Nombre:</p>
        <input type="text" id="nombreAlumno">
        <p id="fb-nombre"></p>
    <p>Edad:</p>
        <input type="number" id="edad">
        <p id="fb-edad"></p>
    <p>Presupuesto:</p>
        <input type="number" id="presupuesto">
        <p id="fb-presupuesto"></p>
        
    <p>Destino preferido:</p>
        <select name="destinoPreferido" id="destino">
            <option value="Me da igual"selected>Me da igual</option><br>
            <option value="Bariloche">Bariloche</option><br>
            <option value="Mendoza">Mendoza</option><br>
            <option value="Cataratas">Cataratas</option>
            <p id="fb-destino"></p>
        </select>
    <p>Temporada:</p>
        <select name="temporada" id="temporada">
            <option value="Ambos meses"selected>Ambos meses</option><br>
            <option value="Enero">Enero</option><br>
            <option value="Febrero">Febrero</option><br>
        </select>
        <p id="fb-temporada"></p>
    <p>Seguro de viaje: </p>
        <input type="checkbox" id="seguro">
        <option value="Acepta"></option>
    <input type="button" value="Ver disponibilidadm">

    <script src="script.js"></script>
</body>
</html>

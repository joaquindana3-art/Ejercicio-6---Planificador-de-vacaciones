<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de vacaciones</title>
</head>
<body>
    <h1>Bienvenido al planificador de vacaciones</h1>
    <p>Ingrese los siguientes datos:</p>
    
    <p>Nombre:</p><br>
        <input type="text" id="nombreAlumno"><br>
        <p id="fb-nombre"></p>
    <p>Edad:</p><br>
        <input type="number" id="edad"><br>
        <p id="fb-edad"></p>
    <p>Presupuesto:</p><br>
        <input type="number" id="presupuesto"><br>
        <p id="fb-presupuesto"></p>
        
    <p>Destino preferido:</p>
        <select name="destinoPreferido" id="destino"></select><br>
        <option value="Me da igual"selected></option><br>
        <option value="Bariloche"></option><br>
        <option value="Mendoza"></option><br>
        <option value="Cataratas"></option>
        <p id="fb-destinoPreferido"></p>
    <p>Temporada:</p><br>
        <select name="temporada" id="temporada"></select><br>
        <option value="Ambos meses"selected></option><br>
        <option value="Enero"></option><br>
        <option value="Febrero"></option><br>
        <p id="fb-temporada"></p>
    <p>Seguro de viaje: </p><br>
        <input type="checkbox" id="seguro"><br>
        <option value="Acepta"></option>
    <input type="button"><br>



    <script src="script.js"></script>
</body>
</html>
